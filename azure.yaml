name: sre-agent-demo
metadata:
  template: msftlabs-sre-agent-demo
hooks:
  preprovision:
    shell: pwsh
    run: scripts/preprovision.ps1
    continueOnError: false
  postprovision:
    shell: pwsh
    run: scripts/postprovision.ps1
    continueOnError: true
  postup:
    shell: pwsh
    run: scripts/postup.ps1
services:
  web:
    project: ./src/web
    host: appservice
    language: dotnet
